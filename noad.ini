[custom]
;================================================
; 规则集设置 (分流归位精简版)
;================================================

; 1. 结构地基
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

; 2. 核心专项分流 (让 AI、Google、GitHub 命中自己的组)
ruleset=💰 加密货币,[]DOMAIN-KEYWORD,binance
ruleset=💰 加密货币,[]DOMAIN-KEYWORD,okx

ruleset=🤖 AI服务,[]GEOSITE,openai
ruleset=🤖 AI服务,[]DOMAIN-KEYWORD,gemini
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn

ruleset=🚀 GitHub,[]GEOSITE,github

ruleset=🇬 谷歌服务,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]DOMAIN-KEYWORD,google
ruleset=🇬 谷歌服务,[]GEOSITE,google

; 3. 其他杂项代理 (统一交给“手动选择”，省行数防崩溃)
ruleset=🚀 手动选择,[]GEOSITE,apple
ruleset=🚀 手动选择,[]GEOSITE,microsoft
ruleset=🚀 手动选择,[]GEOSITE,category-communication
ruleset=🚀 手动选择,[]GEOSITE,category-social-media-!cn
ruleset=🚀 手动选择,[]GEOSITE,youtube
ruleset=🚀 手动选择,[]GEOSITE,gfw

; 4. 外部库与测试
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest

; 5. 直连与漏网
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🐟 漏网之鱼,[]FINAL


;================================================
; 策略组设置 (Proxy Groups)
;================================================
; 主入口
custom_proxy_group=🚀 手动选择`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇼🇸 台湾节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🚀 手动选择2`select`[]⚖️ 负载均衡-轮询`[]⚖️ 负载均衡-散列`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇼🇸 台湾节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=⚖️ 负载均衡-轮询`load-balance`.*`http://www.google.com/generate_204`300,round-robin
custom_proxy_group=⚖️ 负载均衡-散列`load-balance`.*`http://www.google.com/generate_204`300,consistent-hashing
custom_proxy_group=♻️ 自动选择`url-test`.*`https://www.gstatic.com/generate_204`300,,50

; 核心专项组 (让它们重新出现在控制面板里)
custom_proxy_group=💰 加密货币`select`[]🚀 手动选择`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇼🇸 台湾节点`[]🇸🇬 新加坡节点`[]🎯 全球直连`.*
custom_proxy_group=🤖 AI服务`select`[]🚀 手动选择`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇼🇸 台湾节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🚀 GitHub`select`[]🚀 手动选择`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇼🇸 台湾节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🇬 谷歌服务`select`[]🚀 手动选择`[]🇺🇸 美国节点`[]🇭🇰 香港节点`[]🇯🇵 日本节点`[]🇼🇸 台湾节点`[]🇸🇬 新加坡节点`.*

; 地区组
custom_proxy_group=🇺🇸 美国节点`url-test`(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|UnitedStates)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇭🇰 香港节点`url-test`(港|HK|hk|Hong Kong|HongKong|hongkong|深港)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|(?<!尼|-)日|JP|Japan|🇯🇵)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇼🇸 台湾节点`url-test`(台|新北|彰化|TW|Taiwan)`https://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新加坡|坡|狮城|SG|Singapore)`https://www.gstatic.com/generate_204`300,,50

custom_proxy_group=🚀 测速工具`select`[]🚀 手动选择`[]🎯 全球直连`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]🎯 全球直连`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
