[custom]
;================================================
; 规则集设置 (终极防截胡 + 兜底直连版)
;================================================

; -----------------------------------------------
; 0. 终极置顶特权区 (绝对防截胡)
; -----------------------------------------------
; 本地局域网防代理死循环 (绝对不能动)
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

; 币安防截胡特权 (包含所有暗桩API)
ruleset=💰 加密货币,[]DOMAIN-KEYWORD,binance
ruleset=💰 加密货币,[]DOMAIN-KEYWORD,bnbstatic
ruleset=💰 加密货币,[]DOMAIN-KEYWORD,binanceapi
ruleset=💰 加密货币,[]DOMAIN-KEYWORD,bntrace

; AI 服务防截胡特权 (Gemini 家族全家桶与大模型)
ruleset=🤖 AI服务,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,bing
ruleset=🤖 AI服务,[]DOMAIN-KEYWORD,gemini
ruleset=🤖 AI服务,[]DOMAIN-KEYWORD,generativelanguage
ruleset=🤖 AI服务,[]DOMAIN-KEYWORD,aistudio
ruleset=🤖 AI服务,[]DOMAIN-KEYWORD,makersuite
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,bard.google.com
ruleset=🤖 AI服务,[]DOMAIN-SUFFIX,gemini.google.com
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn

; 谷歌服务防截胡特权 (严格放在 Gemini 下方兜底)
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=🇬 谷歌服务,[]DOMAIN-KEYWORD,google
ruleset=🇬 谷歌服务,[]DOMAIN-KEYWORD,gstatic
ruleset=🇬 谷歌服务,[]DOMAIN-KEYWORD,googleapis
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🇬 谷歌服务,[]GEOIP,google,no-resolve

; -----------------------------------------------
; 1. 核心代理与网络测试 (Core Proxy & Test)
; -----------------------------------------------
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800
;ruleset=🚀 手动选择,[]GEOSITE,gfw
ruleset=🚀 测速工具,[]GEOSITE,category-speedtest

; -----------------------------------------------
; 2. 模型下载专属规则 (Model Downloads)
; -----------------------------------------------
ruleset=📦 模型下载,[]DOMAIN-KEYWORD,huggingface
ruleset=📦 模型下载,[]DOMAIN-SUFFIX,huggingface.co
ruleset=📦 模型下载,[]DOMAIN-SUFFIX,hf.co
ruleset=📦 模型下载,[]DOMAIN-KEYWORD,civitai
ruleset=📦 模型下载,[]DOMAIN-SUFFIX,civitai.com
ruleset=📦 模型下载,[]DOMAIN-KEYWORD,lmstudio
ruleset=📦 模型下载,[]DOMAIN-SUFFIX,lmstudio.ai

; -----------------------------------------------
; 3. 科技巨头服务 (Tech Services)
; -----------------------------------------------
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft

; -----------------------------------------------
; 4. 社交与通讯 (Social & Comm)
; -----------------------------------------------
ruleset=💬 即时通讯,[]GEOSITE,category-communication
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve

; -----------------------------------------------
; 5. 媒体与游戏 (Media & Gaming)
; -----------------------------------------------
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🎥 AppleTV+,[]GEOSITE,apple-tvplus
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment
ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=🎮 游戏平台,[]GEOSITE,category-games

; -----------------------------------------------
; 6. 全球直连规则 (最劣后)
; -----------------------------------------------
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800
ruleset=🎯 全球直连,[]GEOSITE,google-cn
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,2880
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

; -----------------------------------------------
; 7. 国内兜底与全局漏网之鱼 (Fallback)
; -----------------------------------------------
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800
ruleset=🐟 漏网之鱼,[]FINAL


;================================================
; 策略组设置 (Proxy Groups)
;================================================

; 1. 🚀 手动选择 (主入口)
